services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: crm_bot
      POSTGRES_USER: crm_bot
      POSTGRES_PASSWORD: crm_bot
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crm_bot -d crm_bot"]
      interval: 5s
      timeout: 3s
      retries: 10

  bot:
    build: .
    env_file:
      - .env
    environment:
      # Web panel havolasi asosi. .env da bo'lsa o'sha, aks holda server IP.
      # (.env git'ga chiqmaydi, shuning uchun default shu yerda turadi.)
      WEBAPP_BASE_URL: ${WEBAPP_BASE_URL:-http://52.55.79.225:8080}
      WEBAPP_HOST: ${WEBAPP_HOST:-0.0.0.0}
      WEBAPP_PORT: ${WEBAPP_PORT:-8080}
    ports:
      # Analitika web-paneli (owner/TOP/product menejer)
      - "${WEBAPP_PORT:-8080}:${WEBAPP_PORT:-8080}"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:

