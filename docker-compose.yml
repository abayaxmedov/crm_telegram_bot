services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: crm_bot
      POSTGRES_USER: crm_bot
      POSTGRES_PASSWORD: crm_bot
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crm_bot -d crm_bot"]
      interval: 5s
      timeout: 3s
      retries: 10

  bot:
    build: .
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:

